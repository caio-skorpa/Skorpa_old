services:
  skorpa-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: skorpa-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    env_file:
      - .env
    networks:
      - skorpa-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/cache-info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Serviço para desenvolvimento
  skorpa-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: skorpa-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - /app/node_modules
      - /app/.next
    networks:
      - skorpa-network
    profiles:
      - dev

networks:
  skorpa-network:
    driver: bridge
