<dialog id="modal-3">
    <div class="modal-head">
        <button class="close-modal closeModal" data-modal="modal-3" type="button">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <h1>
            Criando nova pasta
        </h1>
        <h4>
            Adicione um nome à pasta e escolha os ativos de sua preferência
        </h4>
    </div>
    <div class="modal-content">
        <form action="">
            <label class="custom-field">
                <input type="text" required maxlength="20">
                <span class="placeholder">Nome da pasta</span>
            </label>
        </form>
    </div>
    <div class="modal-footer">
        <button class="create-folder">
            Criar pasta
        </button>
    </div>
</dialog>
