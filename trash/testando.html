<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body {
            margin: 0;
            box-sizing: border-box;
            height: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .head {
            background-color: grey;
            position: absolute;
            top: 40px;
            display: flex;
            width: 90%;
            height: 110px;
            /* apenas para visualização */
            justify-content: center;
            align-items: center;
            border-radius: 12px;
        }

        .slider {
            display: flex;
            background-color: red;
            width: 90%;
            position: absolute;
            top: 170px;
            border-radius: 12px;
            justify-content: center;
            align-items: center;
            /* height: 50px; */
            height: 2.7em;

        }
    </style>
</head>

<body>
    <div class="head">a</div>
    <div class="slider">b</div>
</body>

</html>
